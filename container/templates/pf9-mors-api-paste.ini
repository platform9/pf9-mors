[app:morsService]
paste.app_factory = mors.mors_wsgi:app_factory

[app:healthService]
paste.app_factory = mors.mors_wsgi:health_app_factory

[composite:main]
use = egg:Paste#urlmap
/health = healthService
/ = authPipeline

[pipeline:authPipeline]
pipeline = authtoken morsService

[filter:authtoken]
paste.filter_factory = keystonemiddleware.auth_token:filter_factory
username = mors
password = $MORS_KEYSTONE_PASSWORD
project_name = services
user_domain_id = default
project_domain_id = default
auth_plugin = v3password
auth_url = http://keystone.$INFRA_NAMESPACE.svc.cluster.local:5000/keystone/v3
region_name = $REGION_NAME
insecure = True
