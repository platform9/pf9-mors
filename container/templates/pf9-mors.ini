[DEFAULT]
db_conn=mysql+pymysql://$MORS_DB_USER:$MORS_DB_PASSWORD@$DB_HOST:$DB_PORT/mors
context_factory=nova
lease_handler=
listen_port=8989
sleep_seconds=60
paste-ini=/etc/pf9/pf9-mors-api-paste.ini
log_file=/var/log/pf9/pf9-mors.log
log_level=INFO
repo=/usr/local/lib/python3.9/site-packages/mors_repo

[nova]
user_name=mors
password=$MORS_KEYSTONE_PASSWORD
version=2.1
auth_url=http://keystone.$INFRA_NAMESPACE.svc.cluster.local:5000/keystone/v3
region_name=$REGION_NAME
